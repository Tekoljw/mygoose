name: Build Goose Main Branch

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.branch }}
        
    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      
    - name: Check Cargo.toml version
      run: |
        echo "Checking Cargo.toml..."
        grep -E 'version|name' Cargo.toml || echo "No Cargo.toml found"
        
    - name: Build Release Binary
      run: |
        if [ -f Cargo.toml ]; then
          cargo build --release --locked
          ls -lh target/release/goose 2>/dev/null || echo "Binary not found"
        else
          echo "No Cargo.toml found, cannot build"
        fi
        
    - name: Upload Binary Artifact
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: goose-main-binary
        path: target/release/goose
        retention-days: 7
